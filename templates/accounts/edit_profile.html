{% extends 'base.html' %}
{% block title %}Edit Profile — Swad{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card" style="max-width:560px">
    <div class="auth-logo">✏️</div>
    <h1>Edit Profile</h1>
    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="form-row">
        <div class="form-group"><label>First Name</label><input type="text" name="first_name" value="{{ user.first_name }}" placeholder="First name"></div>
        <div class="form-group"><label>Last Name</label><input type="text" name="last_name" value="{{ user.last_name }}" placeholder="Last name"></div>
      </div>
      <div class="form-group"><label>Bio</label><textarea name="bio" rows="3" placeholder="Tell us about yourself…">{{ profile.bio }}</textarea></div>
      <div class="form-group">
        <label>Your State (personalises your recipe feed)</label>
        <select name="state">
          <option value="">Select your state</option>
          {% for s in states %}<option value="{{ s.id }}" {% if profile.state == s %}selected{% endif %}>{{ s.name }} — {{ s.native_name }}</option>{% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Preferred Language (for recipe translations)</label>
        <select name="preferred_language">
          <option value="">Select language</option>
          {% for lang in languages %}<option value="{{ lang.id }}" {% if profile.preferred_language == lang %}selected{% endif %}>{{ lang.name }} — {{ lang.native_name }}</option>{% endfor %}
        </select>
      </div>
      <div class="form-group"><label>Profile Photo</label><input type="file" name="avatar" accept="image/*"></div>
      <button type="submit" class="btn-auth">Save Changes</button>
      <a href="{% url 'profile' %}" style="display:block;text-align:center;margin-top:.75rem;color:var(--text-muted)">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
